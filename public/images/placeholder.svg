<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>

    <!-- Glow for the logo area -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0"/>
    </radialGradient>

    <!-- Clip for rounded rect -->
    <clipPath id="roundedClip">
      <rect width="1200" height="630" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative accent lines -->
  <line x1="0" y1="0" x2="1200" y2="630" stroke="rgba(29,78,216,0.12)" stroke-width="1"/>
  <line x1="1200" y1="0" x2="0" y2="630" stroke="rgba(29,78,216,0.12)" stroke-width="1"/>

  <!-- Top-left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#1d4ed8" opacity="0.8"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="618" width="1200" height="12" fill="#1d4ed8" opacity="0.6"/>

  <!-- Glow circle behind logo -->
  <ellipse cx="600" cy="270" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Logo diamond shape (matches the Phehlwana diamond logo mark) -->
  <g transform="translate(600, 230)">
    <!-- Outer diamond -->
    <polygon points="0,-72 62,0 0,72 -62,0" fill="none" stroke="#1d4ed8" stroke-width="3" opacity="0.9"/>
    <!-- Inner diamond -->
    <polygon points="0,-48 41,0 0,48 -41,0" fill="#1d4ed8" opacity="0.15"/>
    <!-- Arrow / chevron mark -->
    <polyline points="-22,-18 0,18 22,-18" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Top dot -->
    <circle cx="0" cy="-18" r="5" fill="#60a5fa"/>
  </g>

  <!-- Company name -->
  <text
    x="600"
    y="358"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="700"
    fill="#f8fafc"
    text-anchor="middle"
    letter-spacing="1"
  >Phehlwana Group</text>

  <!-- Tagline -->
  <text
    x="600"
    y="396"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="400"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="3"
  >INVESTMENTS</text>

  <!-- Divider -->
  <line x1="480" y1="420" x2="720" y2="420" stroke="#1d4ed8" stroke-width="1.5" opacity="0.6"/>

  <!-- Sub-tagline -->
  <text
    x="600"
    y="450"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#64748b"
    text-anchor="middle"
    letter-spacing="2"
  >Construction · Engineering · Plant Hire · Cleaning</text>

  <!-- Corner watermark — top right -->
  <text
    x="1180"
    y="36"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11"
    fill="#334155"
    text-anchor="end"
    letter-spacing="1"
  >phehlwanagroup.co.za</text>
</svg>
