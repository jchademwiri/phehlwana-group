<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1000"/>
      <stop offset="100%" style="stop-color:#2d1f00"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="6" height="630" fill="#d97706" opacity="0.9"/>
  <rect x="0" y="618" width="1200" height="12" fill="#d97706" opacity="0.5"/>

  <!-- TLB / excavator icon -->
  <g transform="translate(600, 230)">
    <!-- Cab body -->
    <rect x="-30" y="-60" width="60" height="50" rx="4" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <!-- Cab window -->
    <rect x="-20" y="-52" width="40" height="25" rx="2" fill="#d97706" opacity="0.3" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Main chassis -->
    <rect x="-70" y="-10" width="140" height="30" rx="4" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <!-- Tracks -->
    <rect x="-75" y="20" width="150" height="18" rx="9" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <!-- Track wheels -->
    <circle cx="-55" cy="29" r="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="0" cy="29" r="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="55" cy="29" r="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <!-- Boom arm -->
    <line x1="30" y1="-35" x2="90" y2="-80" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="-80" x2="110" y2="-30" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <!-- Bucket -->
    <path d="M100,-30 L120,-30 L115,-10 L105,-10 Z" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <!-- Wet/Dry badge -->
    <g transform="translate(-90, -70)" opacity="0.9">
      <circle cx="0" cy="0" r="22" fill="#d97706" opacity="0.2" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="0" y="5" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fbbf24" text-anchor="middle">WET</text>
      <text x="0" y="-5" font-family="system-ui,sans-serif" font-size="7" fill="#fbbf24" text-anchor="middle" opacity="0.7">DRY</text>
    </g>
  </g>

  <!-- Category label -->
  <rect x="490" y="355" width="220" height="28" rx="14" fill="#d97706" opacity="0.2"/>
  <text x="600" y="374" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle" letter-spacing="3">PLANT HIRE</text>

  <text x="600" y="420" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#f1f5f9" text-anchor="middle">Wet Hire vs Dry Hire</text>
  <text x="600" y="458" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Choosing the right option for your project</text>

  <line x1="500" y1="480" x2="700" y2="480" stroke="#d97706" stroke-width="1" opacity="0.5"/>

  <text x="600" y="508" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="2">PHEHLWANA GROUP INVESTMENTS</text>
  <text x="1180" y="36" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#334155" text-anchor="end" letter-spacing="1">phehlwanagroup.co.za</text>
</svg>
