<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#0d2b1a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="6" height="630" fill="#059669" opacity="0.9"/>
  <rect x="0" y="618" width="1200" height="12" fill="#059669" opacity="0.5"/>

  <!-- Recycling / waste icon -->
  <g transform="translate(600, 220)">
    <!-- Bin body -->
    <path d="M-45,10 L-35,-60 L35,-60 L45,10 Z" fill="none" stroke="#34d399" stroke-width="3" stroke-linejoin="round"/>
    <!-- Bin lid -->
    <rect x="-55" y="-70" width="110" height="14" rx="7" fill="none" stroke="#34d399" stroke-width="3"/>
    <!-- Lid handle -->
    <rect x="-15" y="-82" width="30" height="14" rx="7" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <!-- Bin lines -->
    <line x1="-15" y1="-55" x2="-18" y2="5" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="-55" x2="18" y2="5" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <!-- Recycling arrows (circular) -->
    <g transform="translate(0, 45)">
      <path d="M0,-28 A28,28 0 0 1 24,14" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M24,14 A28,28 0 0 1 -24,14" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M-24,14 A28,28 0 0 1 0,-28" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Arrow heads -->
      <polygon points="0,-28 -7,-18 7,-18" fill="#34d399"/>
      <polygon points="24,14 14,8 18,22" fill="#34d399"/>
      <polygon points="-24,14 -18,22 -14,8" fill="#34d399"/>
    </g>
    <!-- Compliance badge -->
    <g transform="translate(65, -75)" opacity="0.9">
      <circle cx="0" cy="0" r="22" fill="#059669" opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
      <text x="0" y="-4" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#34d399" text-anchor="middle">NEM:WA</text>
      <text x="0" y="7" font-family="system-ui,sans-serif" font-size="8" fill="#34d399" text-anchor="middle">✓</text>
    </g>
  </g>

  <!-- Category label -->
  <rect x="460" y="355" width="280" height="28" rx="14" fill="#059669" opacity="0.2"/>
  <text x="600" y="374" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle" letter-spacing="3">CLEANING &amp; WASTE</text>

  <text x="600" y="420" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#f1f5f9" text-anchor="middle">Waste Management Compliance</text>
  <text x="600" y="458" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">What your business needs to know</text>

  <line x1="500" y1="480" x2="700" y2="480" stroke="#059669" stroke-width="1" opacity="0.5"/>

  <text x="600" y="508" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="2">PHEHLWANA GROUP INVESTMENTS</text>
  <text x="1180" y="36" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#334155" text-anchor="end" letter-spacing="1">phehlwanagroup.co.za</text>
</svg>
