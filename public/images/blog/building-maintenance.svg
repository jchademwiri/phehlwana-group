<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a2e"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="6" height="630" fill="#1d4ed8" opacity="0.9"/>
  <rect x="0" y="618" width="1200" height="12" fill="#1d4ed8" opacity="0.5"/>

  <!-- Building icon -->
  <g transform="translate(600, 220)">
    <!-- Main building -->
    <rect x="-60" y="-80" width="120" height="110" fill="none" stroke="#60a5fa" stroke-width="3" rx="2"/>
    <!-- Roof -->
    <polygon points="-70,-80 0,-130 70,-80" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="-15" y="10" width="30" height="40" fill="none" stroke="#60a5fa" stroke-width="2.5" rx="2"/>
    <!-- Windows row 1 -->
    <rect x="-45" y="-55" width="22" height="20" fill="#1d4ed8" opacity="0.6" rx="2"/>
    <rect x="23" y="-55" width="22" height="20" fill="#1d4ed8" opacity="0.6" rx="2"/>
    <!-- Windows row 2 -->
    <rect x="-45" y="-20" width="22" height="20" fill="#1d4ed8" opacity="0.4" rx="2"/>
    <rect x="23" y="-20" width="22" height="20" fill="#1d4ed8" opacity="0.4" rx="2"/>
    <!-- Wrench overlay -->
    <g transform="translate(52, -90)" opacity="0.9">
      <circle cx="0" cy="0" r="22" fill="#1d4ed8" opacity="0.2" stroke="#60a5fa" stroke-width="1.5"/>
      <path d="M-8,-8 L8,8 M4,-10 A8,8 0 0 1 10,4 L6,8 A8,8 0 0 1 -8,-6 Z" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Category label -->
  <rect x="480" y="355" width="240" height="28" rx="14" fill="#1d4ed8" opacity="0.25"/>
  <text x="600" y="374" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle" letter-spacing="3">CONSTRUCTION TIPS</text>

  <!-- Title -->
  <text x="600" y="420" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#f1f5f9" text-anchor="middle">Building Maintenance</text>
  <text x="600" y="458" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Protect your property investment</text>

  <line x1="500" y1="480" x2="700" y2="480" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>

  <text x="600" y="508" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="2">PHEHLWANA GROUP INVESTMENTS</text>
  <text x="1180" y="36" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#334155" text-anchor="end" letter-spacing="1">phehlwanagroup.co.za</text>
</svg>
