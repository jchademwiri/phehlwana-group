<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1f0c"/>
      <stop offset="100%" style="stop-color:#0f3320"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="6" height="630" fill="#16a34a" opacity="0.9"/>
  <rect x="0" y="618" width="1200" height="12" fill="#16a34a" opacity="0.5"/>

  <!-- Hard hat icon -->
  <g transform="translate(600, 220)">
    <!-- Hat dome -->
    <path d="M-70,20 Q-70,-60 0,-70 Q70,-60 70,20 Z" fill="none" stroke="#4ade80" stroke-width="3"/>
    <!-- Hat brim -->
    <rect x="-85" y="20" width="170" height="16" rx="8" fill="none" stroke="#4ade80" stroke-width="3"/>
    <!-- Chin strap suggestion -->
    <line x1="-60" y1="36" x2="-60" y2="55" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="36" x2="60" y2="55" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
    <!-- Ventilation stripe -->
    <path d="M-30,-50 Q0,-55 30,-50" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.6"/>
    <!-- Shield badge on hat -->
    <path d="M0,-30 L12,-22 L12,-8 L0,-2 L-12,-8 L-12,-22 Z" fill="#16a34a" opacity="0.4" stroke="#4ade80" stroke-width="1.5"/>
    <text x="0" y="-12" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4ade80" text-anchor="middle">OHS</text>
    <!-- Checkmark -->
    <g transform="translate(55, -65)" opacity="0.9">
      <circle cx="0" cy="0" r="22" fill="#16a34a" opacity="0.2" stroke="#4ade80" stroke-width="1.5"/>
      <polyline points="-9,0 -3,8 10,-8" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Category label -->
  <rect x="470" y="355" width="260" height="28" rx="14" fill="#16a34a" opacity="0.2"/>
  <text x="600" y="374" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#4ade80" text-anchor="middle" letter-spacing="3">SAFETY &amp; COMPLIANCE</text>

  <text x="600" y="420" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#f1f5f9" text-anchor="middle">OHS Act Compliance</text>
  <text x="600" y="458" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">What every construction site must have</text>

  <line x1="500" y1="480" x2="700" y2="480" stroke="#16a34a" stroke-width="1" opacity="0.5"/>

  <text x="600" y="508" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="2">PHEHLWANA GROUP INVESTMENTS</text>
  <text x="1180" y="36" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#334155" text-anchor="end" letter-spacing="1">phehlwanagroup.co.za</text>
</svg>
